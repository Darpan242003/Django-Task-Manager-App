{% extends "main.html" %}

{% block content %}


<center>
    <h1>Register</h1>
    {% if pw_mismatch %}
    <h4 style="color:red">Password doesn't match! Enter Again</h4>
    {% endif %}
    
    <form action="" method="POST">
        {% csrf_token %}
        <input type="text" name="first_name" id="" placeholder="First Name" value=""><br>
        <input type="text" name="last_name" id="" placeholder="Last Name" value=""><br>
        <input type="email" name="email" id="" placeholder="Email Address" value=""><br>
        <input type="text" name="username" id="" placeholder="Username" value=""><br>
        <input type="password" name="password" id="" placeholder="Password" value=""><br>
        <input type="password" name="confirm_password" id="" placeholder="Confirm Password" value=""><br>
        <button type="submit">Login</button>
    </form>

</center>

{% endblock content %}
