{% extends "main.html" %}

{% block content %}


<center>
    <h1>Login</h1>
    
    {% if pw_mismatch %}
    <h4 style="color:red">Invalid Credentials</h4>
    {% endif %}

    {% if success %}
    <h4 style="color:green">Password Chaged Successfully.</h4>
    {% endif %}

    <form action="" method="POST">
        {% csrf_token %}
        <input type="text" name="username" id="" placeholder="Username" value=""><br>
        <input type="text" name="password" id="" placeholder="Password" value=""><br>
        <button type="submit">Login</button>
    </form>

</center>

{% endblock content %}
