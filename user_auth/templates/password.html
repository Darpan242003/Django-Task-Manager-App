{% extends "main.html" %}

{% block content %}

<center>
    <h1>Change Password</h1>

    {% if failed %}
    <h4>Incorrect Old password</h4>
    {% endif %}

    <form action="" method="POST">
        {% csrf_token %}

        <input type="password" name="old_password" id="" placeholder="Old Password"><br>
        <input type="password" name="new_password" id="" placeholder="New Password"><br>
        <button type="submit">Change Password</button><br>

    </form>
</center>

{% endblock content %}
